<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>※'s Projects</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }
    h1 { font-size: 2rem; margin-bottom: 8px; }
    .sub { color: #8b949e; margin-bottom: 48px; font-size: 1rem; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      max-width: 860px;
      width: 100%;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s;
    }
    .card:hover { border-color: #58a6ff; transform: translateY(-3px); }
    .card h2 { font-size: 1.1rem; margin-bottom: 8px; color: #58a6ff; }
    .card p { font-size: 0.9rem; color: #8b949e; line-height: 1.6; }
  </style>
</head>
<body>
  <h1>※'s Projects</h1>
  <p class="sub">実験・ツール置き場</p>
  <div class="grid">
    <a class="card" href="tettet.html">
      <h2>ランダム図形アート</h2>
      <p>カラフルなサークルを画面いっぱいにランダム生成するビジュアルアート。</p>
    </a>
    <a class="card" href="https://dinocrisishiro-png.github.io/te2/">
      <h2>※ 296 System</h2>
      <p>起床時間を入力すると、準備・生産・創造の3フェーズに分けた1日のタイムラインを自動生成。</p>
    </a>
    <a class="card" href="https://dinocrisishiro-png.github.io/te3/">
      <h2>図形アート (te3)</h2>
      <p>ランダム図形アートの別バージョン。リロードするたびに変化するレイアウト。</p>
    </a>
  </div>
</body>
</html>
